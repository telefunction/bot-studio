name: Update Bot API schema

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bot-api-schema
  cancel-in-progress: false

jobs:
  update-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update Telegram Bot API schema
        run: npm run schema:update

      - name: Normalize schema
        run: npm run schema:normalize

      - name: Commit schema update
        run: |
          if [ -z "$(git status --porcelain -- public/schema/bot-api.json)" ]; then
            echo "No schema changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/schema/bot-api.json
          git commit -m "chore: update Telegram Bot API schema"
          git push
